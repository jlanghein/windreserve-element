server_name: "matrix.windreserve.de"
public_baseurl: "https://matrix.windreserve.de/"
pid_file: /data/homeserver.pid
report_stats: false

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    bind_addresses: ['0.0.0.0']
    resources:
      - names: [client, federation]
        compress: false

database:
  name: psycopg2
  args:
    user: synapse
    password: "${POSTGRES_PASSWORD}"
    database: synapse
    host: postgres
    port: 5432
    cp_min: 5
    cp_max: 10

log_config: "/data/log.config"
media_store_path: /data/media_store

# Authenticated media downloads (Matrix v1.11+)
# Requires Element Web 1.12+ for proper support
# Media can only be downloaded with valid access token
enable_authenticated_media: true
signing_key_path: "/data/keys/signing.key"
trusted_key_servers:
  - server_name: "matrix.org"

# Registration (disabled by default - create users via CLI)
enable_registration: false
enable_registration_without_verification: false

# Email notifications
email:
  smtp_host: smtp.strato.de
  smtp_port: 465
  smtp_user: noreply@windreserve.de
  smtp_pass: "${SMTP_PASS}"
  notif_from: "WindReserve Chat <noreply@windreserve.de>"
  require_transport_security: true

# TURN server for voice/video
turn_uris:
  - "turn:turn.windreserve.de:3478?transport=udp"
  - "turn:turn.windreserve.de:3478?transport=tcp"
  - "turns:turn.windreserve.de:5349?transport=tcp"
turn_shared_secret: "${TURN_SECRET}"
turn_user_lifetime: 86400000
turn_allow_guests: false

# Web client location
web_client_location: "https://element.windreserve.de/"

# Privacy settings (keep internal)
allow_profile_lookup_over_federation: false
require_auth_for_profile_requests: true

# Rate limiting
rc_invites:
  per_room:
    per_second: 0.5
    burst_count: 5
  per_user:
    per_second: 0.5
    burst_count: 3

# Cleanup old devices
delete_stale_devices_after: 1y

# Suppress matrix.org key server warning
suppress_key_server_warning: true
