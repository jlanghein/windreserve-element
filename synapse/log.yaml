handlers:
  file:
    class: logging.handlers.TimedRotatingFileHandler
    filename: /data/homeserver.log
    when: midnight
    backupCount: 7
    encoding: utf8
  console:
    class: logging.StreamHandler
    formatter: precise

formatters:
  precise:
    format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(message)s'

root:
  level: INFO
  handlers: [console]

loggers:
  synapse.storage.SQL:
    level: WARNING
