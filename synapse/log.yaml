version: 1

disable_existing_loggers: false

handlers:
  console:
    class: logging.StreamHandler
    formatter: precise

formatters:
  precise:
    format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(message)s'

root:
  level: INFO
  handlers: [console]

loggers:
  synapse.storage.SQL:
    level: WARNING
